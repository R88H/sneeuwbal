<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sneeuwbal Hypotheek Simulator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Sneeuwbal Hypotheek Simulator</h1>
      <p class="intro">
        Vergelijk de invloed van het sneeuwbal-effect op meerdere lopende hypotheken
        (annuïteit of lineair).
      </p>

      <section class="card">
        <h2>Hypotheek toevoegen</h2>
        <form id="mortgage-form">
          <div class="grid">
            <label>
              Naam
              <input id="name" type="text" placeholder="Bijv. Woning A" required />
            </label>
            <label>
              Type
              <select id="type" required>
                <option value="annuity">Annuïteit</option>
                <option value="linear">Lineair</option>
              </select>
            </label>
            <label>
              Restschuld (€)
              <input id="principal" type="number" min="1000" step="100" required />
            </label>
            <label>
              Rente (% per jaar)
              <input id="rate" type="number" min="0" step="0.01" required />
            </label>
            <label>
              Looptijd (jaren)
              <input id="years" type="number" min="1" max="40" step="1" required />
            </label>
          </div>
          <button type="submit">+ Toevoegen</button>
        </form>
      </section>

      <section class="card">
        <h2>Instellingen sneeuwbal</h2>
        <div class="grid">
          <label>
            Extra aflossing per maand (€)
            <input id="extra-monthly" type="number" min="0" step="10" value="0" />
          </label>
        </div>
        <button id="calculate">Bereken vergelijking</button>
      </section>

      <section class="card">
        <h2>Actieve hypotheken</h2>
        <div id="mortgage-list" class="list empty">Nog geen hypotheken toegevoegd.</div>
      </section>

      <section class="card">
        <h2>Resultaat</h2>
        <div id="results" class="results empty">Voeg hypotheken toe en klik op berekenen.</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
